<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cron URL Pinger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .shell {
        width: 100%;
        max-width: 720px;
        padding: 32px 24px;
      }
      .card {
        background: radial-gradient(circle at top, #1e293b, #020617);
        border-radius: 18px;
        padding: 24px 22px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.9);
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      .title-block h1 {
        font-size: 20px;
        margin: 0;
        letter-spacing: 0.04em;
      }
      .title-block p {
        margin: 4px 0 0;
        font-size: 13px;
        color: #9ca3af;
      }
      .pill {
        font-size: 11px;
        padding: 4px 9px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.6);
        color: #9ca3af;
      }
      form {
        display: grid;
        grid-template-columns: 1.7fr 0.6fr auto;
        gap: 10px;
        margin-top: 18px;
      }
      label {
        display: block;
        font-size: 11px;
        color: #9ca3af;
        margin-bottom: 6px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      input[type='url'],
      input[type='number'] {
        width: 100%;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        background: rgba(15, 23, 42, 0.85);
        color: #e5e7eb;
        font-size: 13px;
        outline: none;
      }
      input::placeholder {
        color: #6b7280;
      }
      input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-primary {
        background: linear-gradient(135deg, #38bdf8, #22c55e);
        color: #0b1120;
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .btn-ghost {
        background: transparent;
        color: #9ca3af;
      }
      .jobs {
        margin-top: 20px;
        border-top: 1px solid rgba(31, 41, 55, 0.9);
        padding-top: 14px;
      }
      .jobs-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 6px;
      }
      .empty {
        font-size: 13px;
        color: #6b7280;
        padding: 6px 0;
      }
      .job-row {
        display: grid;
        grid-template-columns: 1.9fr 0.7fr 0.9fr auto;
        gap: 8px;
        align-items: center;
        padding: 7px 0;
        border-bottom: 1px dashed rgba(31, 41, 55, 0.7);
        font-size: 12px;
      }
      .job-row:last-child {
        border-bottom: none;
      }
      .url {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New',
          monospace;
        font-size: 11px;
        color: #e5e7eb;
      }
      .url small {
        display: block;
        color: #6b7280;
        margin-top: 2px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        font-size: 11px;
        color: #9ca3af;
      }
      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        margin-right: 4px;
      }
      .badge-dot.ok {
        background: #22c55e;
      }
      .badge-dot.error {
        background: #ef4444;
      }
      .badge-dot.idle {
        background: #6b7280;
      }
      .danger {
        color: #f97316;
      }
      @media (max-width: 640px) {
        .card {
          padding: 18px 16px;
        }
        form {
          grid-template-columns: 1fr;
        }
        .job-row {
          grid-template-columns: 1.7fr 0.9fr;
          grid-template-rows: auto auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <div class="header">
          <div class="title-block">
            <h1>Render Keep-Alive</h1>
            <p>Ping your Render URLs on a simple schedule.</p>
          </div>
          <div class="pill">Minimal • Local or hosted</div>
        </div>

        <form id="job-form">
          <div>
            <label for="url">URL</label>
            <input
              id="url"
              type="url"
              required
              placeholder="https://your-render-app.onrender.com/"
            />
          </div>
          <div>
            <label for="interval">Interval (minutes)</label>
            <input id="interval" type="number" min="1" value="10" required />
          </div>
          <div style="display:flex;align-items:flex-end;justify-content:flex-end;">
            <button class="btn-primary" type="submit" id="add-btn">Add ping</button>
          </div>
        </form>

        <div class="jobs">
          <div class="jobs-header">
            <span>Active URLs</span>
            <button class="btn-ghost" type="button" id="refresh-btn">Refresh</button>
          </div>
          <div id="jobs-list"></div>
        </div>
      </div>
    </div>

    <script>
      const jobsListEl = document.getElementById('jobs-list');
      const form = document.getElementById('job-form');
      const addBtn = document.getElementById('add-btn');
      const refreshBtn = document.getElementById('refresh-btn');

      const API_BASE = '';

      function statusColor(status) {
        if (!status) return 'idle';
        if (status.startsWith('ok')) return 'ok';
        if (status === 'error') return 'error';
        return 'idle';
      }

      function renderJobs(jobs) {
        if (!jobs.length) {
          jobsListEl.innerHTML = '<div class=\"empty\">No URLs yet. Add one above to start pinging.</div>';
          return;
        }
        jobsListEl.innerHTML = '';
        jobs.forEach((job) => {
          const row = document.createElement('div');
          row.className = 'job-row';

          const urlCol = document.createElement('div');
          urlCol.className = 'url';
          urlCol.innerHTML =
            job.url +
            (job.lastPing ? '<small>Last ping: ' + new Date(job.lastPing).toLocaleTimeString() + '</small>' : '');

          const intervalCol = document.createElement('div');
          intervalCol.innerHTML = '<span class=\"badge\">Every ' + job.intervalMs / 60000 + ' min</span>';

          const statusCol = document.createElement('div');
          const color = statusColor(job.status);
          statusCol.innerHTML =
            '<span class=\"badge\">' +
            '<span class=\"badge-dot ' +
            color +
            '\"></span>' +
            (job.status || 'idle') +
            '</span>';

          const actionsCol = document.createElement('div');
          const del = document.createElement('button');
          del.type = 'button';
          del.className = 'btn-ghost danger';
          del.textContent = 'Remove';
          del.onclick = async () => {
            del.disabled = true;
            try {
              await fetch(API_BASE + '/api/jobs/' + job.id, { method: 'DELETE' });
              await loadJobs();
            } catch (err) {
              console.error(err);
              del.disabled = false;
            }
          };
          actionsCol.appendChild(del);

          row.appendChild(urlCol);
          row.appendChild(intervalCol);
          row.appendChild(statusCol);
          row.appendChild(actionsCol);
          jobsListEl.appendChild(row);
        });
      }

      async function loadJobs() {
        try {
          const res = await fetch(API_BASE + '/api/jobs');
          const data = await res.json();
          renderJobs(data);
        } catch (err) {
          console.error(err);
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const url = document.getElementById('url').value.trim();
        const interval = document.getElementById('interval').value;
        if (!url) return;

        addBtn.disabled = true;
        try {
          await fetch(API_BASE + '/api/jobs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, intervalMinutes: interval }),
          });
          form.reset();
          document.getElementById('interval').value = 10;
          await loadJobs();
        } catch (err) {
          console.error(err);
        } finally {
          addBtn.disabled = false;
        }
      });

      refreshBtn.addEventListener('click', loadJobs);

      loadJobs();
      setInterval(loadJobs, 15000);
    </script>
  </body>
  </html>
